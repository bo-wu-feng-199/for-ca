<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人货币计算器 · CashCalc</title>
  <meta name="description" content="极简开发者风格的个人现金计算与记录工具">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════ Top Bar ═══════ -->
  <header class="topbar">
    <div class="container topbar-inner">
      <span class="logo">🧮 CashCalc</span>
      <span class="sub-logo">个人货币计算器</span>
      <button id="theme-btn" class="theme-btn" title="切换主题">🌙</button>
    </div>
  </header>

  <div class="container">

    <!-- ═══════ 1. Input ═══════ -->
    <section class="card">
      <div class="card-title">输入金额</div>

      <div class="input-tabs">
        <button class="tab tab-active" data-mode="dual">双框输入</button>
        <button class="tab" data-mode="smart">单行解析</button>
      </div>

      <div id="input-dual" class="input-row">
        <div class="field">
          <label for="price">商品价格 (¥)</label>
          <input type="text" id="price" inputmode="decimal" placeholder="0.00" maxlength="8" autofocus>
        </div>
        <span class="field-arrow">→</span>
        <div class="field">
          <label for="paid">支付金额 (¥)</label>
          <input type="text" id="paid" inputmode="decimal" placeholder="0.00" maxlength="8">
        </div>
      </div>

      <div id="input-smart" class="input-row" hidden>
        <div class="field full">
          <label for="smart">价格 + 支付（空格 / + / 逗号分隔）</label>
          <input type="text" id="smart" inputmode="text" placeholder="例: 59.5 100" autocomplete="off">
        </div>
      </div>

      <div id="tag-bar" class="tag-bar">
        <span>标签：</span>
        <label class="tag-opt"><input type="radio" name="tag" value="shopping" checked>🛒 购物</label>
        <label class="tag-opt"><input type="radio" name="tag" value="dining">🍜 餐饮</label>
        <label class="tag-opt"><input type="radio" name="tag" value="travel">🚗 出行</label>
        <label class="tag-opt"><input type="radio" name="tag" value="cashier">💰 收银</label>
        <label class="tag-opt"><input type="radio" name="tag" value="other">📋 其他</label>
      </div>

      <div id="error-msg" class="error-msg" hidden></div>
    </section>

    <!-- ═══════ 2. Results ═══════ -->
    <section id="result-area" class="result-area" hidden>
      <div class="card-title">结算方案</div>

      <div id="balance-bar" class="balance-bar"></div>
      <div id="plans-container" class="plans-container"></div>
    </section>

    <!-- ═══════ 3. History ═══════ -->
    <section class="card">
      <div class="card-title-row">
        <span class="card-title">计算记录</span>
        <div class="hist-actions">
          <button id="export-json" class="btn-sm">JSON</button>
          <button id="export-csv"  class="btn-sm">CSV</button>
          <button id="export-md"   class="btn-sm">MD</button>
          <button id="clear-all"   class="btn-sm btn-danger">清空</button>
        </div>
      </div>
      <div id="history-list"></div>
    </section>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
