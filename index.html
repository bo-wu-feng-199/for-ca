<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人货币计算器</title>
  <meta name="description" content="快速计算支付差额的最优货币组合方案">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🧮 个人货币计算器</h1>
      <p class="subtitle">输入商品价格与支付金额，自动计算结算差额的最优货币组合</p>
    </header>

    <main>
      <form id="calc-form" class="calc-form">
        <div class="field">
          <label for="price">商品价格 (¥)</label>
          <input type="number" id="price" step="0.01" min="0" placeholder="例如 59.5" required autofocus>
        </div>
        <div class="field">
          <label for="paid">支付金额 (¥)</label>
          <input type="number" id="paid" step="0.01" min="0" placeholder="例如 100" required>
        </div>
        <button type="submit" id="calc-btn">计算</button>
      </form>

      <!-- Result panel -->
      <div id="result" class="result" hidden>
        <div class="result-summary">
          <span class="result-label">支付差额</span>
          <span class="result-value" id="balance-display">¥0.00</span>
          <span class="result-count" id="count-display">共 0 张/枚</span>
        </div>
        <table id="unit-table">
          <thead>
            <tr><th>面额</th><th>数量</th></tr>
          </thead>
          <tbody id="unit-tbody"></tbody>
        </table>
        <div id="remainder-warn" class="remainder-warn" hidden>
          ⚠️ 有 <span id="remainder-amount">0</span> 元无法用现有面额精确结算
        </div>
      </div>
    </main>

    <footer>
      <p>当前货币体系：人民币 (¥) · 面额 ¥100 / 50 / 20 / 10 / 5 / 1 / 0.5 / 0.1 / 0.05 / 0.01</p>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
